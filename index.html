<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Layout Editor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg: #0e0e10;
  --surface: #16161a;
  --surface2: #1e1e24;
  --border: #2a2a35;
  --border2: #38384a;
  --text: #f0f0f5;
  --muted: #6b6b80;
  --accent: #5b8cff;
  --accent-glow: rgba(91,140,255,0.18);
  --accent2: #ff6b6b;
  --accent2-glow: rgba(255,107,107,0.18);
  --green: #50fa7b;
  --yellow: #ffd93d;
  --cell-bg: #1a1a22;
  --cell-hover: #22222e;
  --guide-color: rgba(91,140,255,0.7);
  --snap-color: rgba(91,140,255,1);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Syne', sans-serif;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column;font-family:var(--sans)}

/* ── HEADER ── */
header{
  height:48px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  flex-shrink:0;z-index:100;
}
.logo{
  font-family:var(--mono);font-size:12px;font-weight:600;
  color:var(--text);letter-spacing:.08em;display:flex;align-items:center;gap:8px;
}
.logo-mark{
  width:22px;height:22px;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;
}
.logo-mark span{
  background:var(--accent);border-radius:1px;display:block;
  transition:opacity .2s;
}
.logo-mark span:nth-child(2){opacity:.4}
.logo-mark span:nth-child(3){opacity:.4}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.grid-config{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}
.cfg-input{
  width:36px;padding:3px 6px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:4px;color:var(--text);font-family:var(--mono);font-size:11px;
  text-align:center;outline:none;
}
.cfg-input:focus{border-color:var(--accent)}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{
  padding:6px 14px;border-radius:5px;font-family:var(--mono);font-size:10px;
  font-weight:600;letter-spacing:.08em;cursor:pointer;border:none;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#7aa3ff}
.btn-auto{background:var(--surface2);border:1px solid var(--border2);color:var(--yellow)}
.btn-auto:hover{border-color:var(--yellow);background:rgba(255,217,61,.08)}

/* ── LAYOUT ── */
.app-body{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;flex-shrink:0;
}
.sb-section{padding:14px;border-bottom:1px solid var(--border)}
.sb-title{
  font-family:var(--mono);font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;
}
.element-list{display:flex;flex-direction:column;gap:5px}
.el-chip{
  display:flex;align-items:center;gap:10px;padding:9px 10px;
  border:1px solid var(--border);border-radius:6px;
  cursor:grab;background:var(--surface2);
  transition:all .15s;user-select:none;
}
.el-chip:hover{border-color:var(--border2);background:var(--cell-hover)}
.el-chip:active{cursor:grabbing;border-color:var(--accent)}
.el-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.el-info{flex:1}
.el-name{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text)}
.el-hint{font-size:9px;color:var(--muted);margin-top:1px}

/* Properties pane */
.props-pane{flex:1;overflow-y:auto;padding:14px}
.no-sel-msg{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:120px;color:var(--muted);font-size:10px;font-family:var(--mono);
  text-align:center;gap:8px;
}
.no-sel-icon{font-size:24px;opacity:.15}
.pr-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.pr-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.pr-inp{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:5px;padding:6px 8px;color:var(--text);
  font-family:var(--mono);font-size:11px;outline:none;width:100%;
}
.pr-inp:focus{border-color:var(--accent)}
.pr-grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.pr-pm{display:flex;flex-direction:column;gap:4px}
.grid-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--accent-glow);border:1px solid var(--accent);
  border-radius:4px;padding:4px 8px;font-family:var(--mono);
  font-size:9px;color:var(--accent);margin-bottom:10px;
}
.del-btn{
  width:100%;padding:8px;background:transparent;
  border:1px solid var(--accent2);border-radius:5px;
  color:var(--accent2);font-family:var(--mono);font-size:10px;
  cursor:pointer;margin-top:6px;transition:all .15s;
}
.del-btn:hover{background:var(--accent2-glow)}

/* ── CANVAS AREA ── */
.canvas-wrap{
  flex:1;background:var(--bg);overflow:auto;
  display:flex;flex-direction:column;align-items:center;
  padding:24px;gap:12px;position:relative;
}
.canvas-label{
  font-family:var(--mono);font-size:10px;color:var(--muted);
  letter-spacing:.08em;flex-shrink:0;
}

/* THE CANVAS */
#canvas{
  position:relative;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  flex-shrink:0;
  overflow:visible;
  user-select:none;
}

/* GRID CELLS */
.grid-bg{
  position:absolute;inset:0;
  display:grid;
  pointer-events:none;
  z-index:1;
  border-radius:5px;
  overflow:hidden;
}
.grid-cell{
  background:var(--cell-bg);
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  pointer-events:all;
  cursor:crosshair;
  transition:background .08s;
  position:relative;
}
.grid-cell:hover{background:var(--cell-hover)}
.grid-cell.guide-col{
  background:rgba(91,140,255,0.06) !important;
}
.grid-cell.guide-row{
  background:rgba(91,140,255,0.06) !important;
}
.grid-cell.guide-target{
  background:rgba(91,140,255,0.14) !important;
  box-shadow:inset 0 0 0 1px var(--guide-color);
}

/* GUIDE LINES overlay */
.guide-overlay{
  position:absolute;inset:0;pointer-events:none;z-index:8;
}
.guide-line-h,.guide-line-v{
  position:absolute;
  background:var(--guide-color);
  pointer-events:none;
}
.guide-line-h{height:1px;left:0;right:0}
.guide-line-v{width:1px;top:0;bottom:0}

/* SNAP PREVIEW */
.snap-preview{
  position:absolute;
  border:2px dashed var(--snap-color);
  border-radius:3px;
  background:rgba(91,140,255,0.09);
  pointer-events:none;
  z-index:9;
  display:none;
  transition:left .04s,top .04s,width .04s,height .04s;
}
.snap-preview.active{display:block}

/* DESIGN ELEMENTS */
.design-el{
  position:absolute;
  border-radius:4px;
  z-index:10;
  cursor:move;
  display:flex;flex-direction:column;align-items:flex-start;
  justify-content:flex-start;
  padding:10px 12px;
  border:1.5px solid transparent;
  transition:border-color .12s, box-shadow .12s, opacity .12s;
  touch-action:none;
  overflow:hidden;
}
.design-el.selected{
  z-index:20;
  box-shadow:0 0 0 2px var(--accent), 0 4px 24px rgba(91,140,255,.2);
}
.design-el.dragging{
  opacity:.7;z-index:100;cursor:grabbing;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
}
/* ghost while dragging (placeholder at original) */
.el-ghost{
  position:absolute;
  border:1.5px dashed var(--border2);
  border-radius:4px;
  background:rgba(255,255,255,.02);
  pointer-events:none;
  z-index:5;
}

/* element type skins */
.el-headline{background:rgba(91,140,255,.07);border-color:rgba(91,140,255,.25)}
.el-headline.selected{border-color:var(--accent)}
.el-subheadline{background:rgba(80,250,123,.06);border-color:rgba(80,250,123,.2)}
.el-subheadline.selected{border-color:var(--green)}
.el-description{background:rgba(255,217,61,.05);border-color:rgba(255,217,61,.18)}
.el-description.selected{border-color:var(--yellow)}
.el-visual{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.2)}
.el-visual.selected{border-color:var(--accent2)}
.el-footer{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1)}
.el-footer.selected{border-color:var(--muted)}

.el-type-tag{
  font-family:var(--mono);font-size:8px;letter-spacing:.15em;
  text-transform:uppercase;opacity:.5;margin-bottom:4px;flex-shrink:0;
}
.el-content-preview{
  font-family:var(--sans);font-size:11px;color:var(--text);
  opacity:.7;line-height:1.4;pointer-events:none;
  overflow:hidden;flex:1;width:100%;
}
.el-headline .el-content-preview{font-size:16px;font-weight:700;opacity:.9}
.el-subheadline .el-content-preview{font-size:13px;font-weight:600;opacity:.8}
.el-description .el-content-preview{font-size:10px;opacity:.6;line-height:1.6}
.el-footer .el-content-preview{font-family:var(--mono);font-size:9px;opacity:.45}
.el-visual .el-content-preview{font-size:28px;display:flex;align-items:center;justify-content:center;flex:1;width:100%;opacity:.3}

/* close X */
.el-close{
  position:absolute;top:-8px;right:-8px;width:18px;height:18px;
  border-radius:50%;background:var(--accent2);border:2px solid var(--bg);
  color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:50;opacity:0;transition:opacity .15s;
  line-height:1;
}
.design-el.selected .el-close,.design-el:hover .el-close{opacity:1}

/* resize handle */
.el-resize{
  position:absolute;bottom:0;right:0;width:16px;height:16px;
  cursor:se-resize;z-index:50;opacity:0;transition:opacity .15s;
}
.el-resize::after{
  content:'';position:absolute;bottom:3px;right:3px;
  width:7px;height:7px;
  border-right:2px solid var(--accent);border-bottom:2px solid var(--accent);
  border-radius:0 0 2px 0;
}
.design-el.selected .el-resize,.design-el:hover .el-resize{opacity:1}

/* ── RIGHT PANEL ── */
.right-panel{
  width:260px;background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.r-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.r-tab{
  flex:1;padding:12px 8px;font-size:9px;font-family:var(--mono);
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
  background:transparent;border:none;cursor:pointer;
  transition:all .15s;border-bottom:2px solid transparent;
}
.r-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-body{flex:1;overflow-y:auto;padding:14px}
.tp{display:none}
.tp.active{display:block}
.code-block{
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:12px;margin-bottom:10px;
}
.code-lbl{
  font-family:var(--mono);font-size:8px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;
}
.code-txt{
  font-family:var(--mono);font-size:9px;color:var(--green);
  line-height:1.8;white-space:pre-wrap;word-break:break-all;
  max-height:200px;overflow-y:auto;
}
.copy-btn{
  width:100%;margin-top:8px;padding:7px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:4px;color:var(--text);
  font-family:var(--mono);font-size:9px;cursor:pointer;
  letter-spacing:.08em;transition:all .15s;
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}

/* TOAST */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--surface);border:1px solid var(--border2);
  color:var(--text);padding:8px 18px;border-radius:20px;
  font-family:var(--mono);font-size:10px;font-weight:500;
  z-index:9999;transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"><span></span><span></span><span></span><span></span></div>
    GRID/ED
  </div>
  <div class="sep"></div>
  <div class="grid-config">
    COLS <input class="cfg-input" id="cfg-cols" type="number" value="5" min="2" max="16" oninput="rebuildGrid()">
    ROWS <input class="cfg-input" id="cfg-rows" type="number" value="6" min="2" max="16" oninput="rebuildGrid()">
    GAP <input class="cfg-input" id="cfg-gap" type="number" value="8" min="0" max="32" oninput="rebuildGrid()">
  </div>
  <div class="header-right">
    <button class="btn btn-auto" onclick="autoLayout()">Auto Layout</button>
    <button class="btn btn-outline" onclick="resetAll()">Reset</button>
    <button class="btn btn-primary" onclick="copyCSS()">Copy CSS</button>
  </div>
</header>

<div class="app-body">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-section">
    <div class="sb-title">Elements</div>
    <div class="element-list" id="el-list">
      <div class="el-chip" draggable="true" ondragstart="palDrag('headline',event)" data-type="headline">
        <div class="el-dot" style="background:var(--accent)"></div>
        <div class="el-info"><div class="el-name">Headline</div><div class="el-hint">Full-width title</div></div>
      </div>
      <div class="el-chip" draggable="true" ondragstart="palDrag('subheadline',event)" data-type="subheadline">
        <div class="el-dot" style="background:var(--green)"></div>
        <div class="el-info"><div class="el-name">Subheadline</div><div class="el-hint">Supporting text</div></div>
      </div>
      <div class="el-chip" draggable="true" ondragstart="palDrag('visual',event)" data-type="visual">
        <div class="el-dot" style="background:var(--accent2)"></div>
        <div class="el-info"><div class="el-name">Visual</div><div class="el-hint">Dominant block</div></div>
      </div>
      <div class="el-chip" draggable="true" ondragstart="palDrag('description',event)" data-type="description">
        <div class="el-dot" style="background:var(--yellow)"></div>
        <div class="el-info"><div class="el-name">Description</div><div class="el-hint">Body copy</div></div>
      </div>
      <div class="el-chip" draggable="true" ondragstart="palDrag('footer',event)" data-type="footer">
        <div class="el-dot" style="background:var(--muted)"></div>
        <div class="el-info"><div class="el-name">Footer</div><div class="el-hint">Bottom zone</div></div>
      </div>
    </div>
  </div>
  <div class="props-pane">
    <div id="no-sel" class="no-sel-msg">
      <div class="no-sel-icon">◱</div>
      <div>Select an element<br>to edit</div>
    </div>
    <div id="props-form" style="display:none">
      <div class="grid-badge" id="pr-grid-span">col 1→5 · row 1→2</div>
      <div class="pr-row">
        <div class="pr-lbl">Content</div>
        <input class="pr-inp" id="pr-content" oninput="updContent()">
      </div>
      <div class="pr-grid2">
        <div class="pr-pm"><div class="pr-lbl">Col Start</div><input class="pr-inp" id="pr-cs" type="number" min="1" oninput="updGridInp()"></div>
        <div class="pr-pm"><div class="pr-lbl">Col End</div><input class="pr-inp" id="pr-ce" type="number" min="2" oninput="updGridInp()"></div>
      </div>
      <div class="pr-grid2">
        <div class="pr-pm"><div class="pr-lbl">Row Start</div><input class="pr-inp" id="pr-rs" type="number" min="1" oninput="updGridInp()"></div>
        <div class="pr-pm"><div class="pr-lbl">Row End</div><input class="pr-inp" id="pr-re" type="number" min="2" oninput="updGridInp()"></div>
      </div>
      <button class="del-btn" onclick="deleteSel()">Delete Element</button>
    </div>
  </div>
</div>

<!-- CANVAS -->
<div class="canvas-wrap" id="canvas-wrap" ondragover="e=>e.preventDefault()" ondrop="palDrop(event)">
  <div class="canvas-label" id="cv-lbl">5 × 6 grid · 8px gap</div>
  <div id="canvas">
    <div class="grid-bg" id="grid-bg"></div>
    <div class="guide-overlay" id="guide-overlay"></div>
    <div class="snap-preview" id="snap-preview"></div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="r-tabs">
    <button class="r-tab active" onclick="switchTab('html',this)">HTML</button>
    <button class="r-tab" onclick="switchTab('css',this)">CSS</button>
  </div>
  <div class="tab-body">
    <div class="tp active" id="tp-html">
      <div class="code-block">
        <div class="code-lbl">HTML Structure</div>
        <div class="code-txt" id="code-html"></div>
        <button class="copy-btn" onclick="copyCode('html')">Copy HTML</button>
      </div>
    </div>
    <div class="tp" id="tp-css">
      <div class="code-block">
        <div class="code-lbl">CSS Grid</div>
        <div class="code-txt" id="code-css"></div>
        <button class="copy-btn" onclick="copyCode('css')">Copy CSS</button>
      </div>
    </div>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  CORE STATE
//  Elements store ONLY grid coordinates.
//  Pixels are derived, never stored.
// ══════════════════════════════════════════
let COLS = 5, ROWS = 6, GAP = 8;
let CANVAS_W = 0, CANVAS_H = 0;
let CELL_W = 0, CELL_H = 0;

let elements = [];   // {id, type, content, colStart, colEnd, rowStart, rowEnd}
let selId = null;
let eid = 0;
let palType = null;

const EL_DEF = {
  headline:    { lbl:'Headline',    content:'Your Headline',           color:'var(--accent)',  defCols:5, defRows:1 },
  subheadline: { lbl:'Subheadline', content:'Supporting subtitle here', color:'var(--green)',   defCols:3, defRows:1 },
  visual:      { lbl:'Visual',      content:'◈',                        color:'var(--accent2)', defCols:3, defRows:3 },
  description: { lbl:'Description', content:'Body copy goes here.',     color:'var(--yellow)',  defCols:2, defRows:3 },
  footer:      { lbl:'Footer',      content:'© 2025 Brand',            color:'var(--muted)',   defCols:5, defRows:1 },
};

// ══════════════════════════════════════════
//  GEOMETRY — derive pixel from grid
// ══════════════════════════════════════════
function cellToPixel(col, row) {
  // col,row are 1-based; returns top-left pixel of that cell
  const x = GAP + (col - 1) * (CELL_W + GAP);
  const y = GAP + (row - 1) * (CELL_H + GAP);
  return { x, y };
}

function elRect(el) {
  const tl = cellToPixel(el.colStart, el.rowStart);
  const br = cellToPixel(el.colEnd, el.rowEnd);
  return {
    x: tl.x,
    y: tl.y,
    w: (br.x + CELL_W) - tl.x,
    h: (br.y + CELL_H) - tl.y,
  };
}

// Convert pixel center to grid cell (1-based, clamped)
function pixelToCell(px, py) {
  const col = Math.round((px - GAP) / (CELL_W + GAP)) + 1;
  const row = Math.round((py - GAP) / (CELL_H + GAP)) + 1;
  return {
    col: Math.max(1, Math.min(COLS, col)),
    row: Math.max(1, Math.min(ROWS, row)),
  };
}

// Snap a pixel rect to the nearest grid-aligned rect
// Returns {colStart, colEnd, rowStart, rowEnd}
function snapElToGrid(px, py, spanCols, spanRows) {
  // Find nearest col start
  let bestCol = 1, bestDx = Infinity;
  for (let c = 1; c <= COLS; c++) {
    const cx = GAP + (c - 1) * (CELL_W + GAP);
    const d = Math.abs(px - cx);
    if (d < bestDx) { bestDx = d; bestCol = c; }
  }
  // Find nearest row start
  let bestRow = 1, bestDy = Infinity;
  for (let r = 1; r <= ROWS; r++) {
    const ry = GAP + (r - 1) * (CELL_H + GAP);
    const d = Math.abs(py - ry);
    if (d < bestDy) { bestDy = d; bestRow = r; }
  }
  // Clamp span
  const colEnd = Math.min(COLS, bestCol + spanCols - 1);
  const rowEnd = Math.min(ROWS, bestRow + spanRows - 1);
  const colStart = Math.max(1, colEnd - spanCols + 1);
  const rowStart = Math.max(1, rowEnd - spanRows + 1);
  return { colStart, colEnd: colEnd + 1, rowStart, rowEnd: rowEnd + 1 };
}

// Snap right/bottom during resize
function snapResizeTo(colStart, rowStart, rightPx, bottomPx) {
  let bestColEnd = colStart + 1, bestDx = Infinity;
  for (let c = colStart + 1; c <= COLS + 1; c++) {
    const rx = GAP + (c - 1) * (CELL_W + GAP) - GAP;
    const d = Math.abs(rightPx - rx);
    if (d < bestDx) { bestDx = d; bestColEnd = c; }
  }
  let bestRowEnd = rowStart + 1, bestDy = Infinity;
  for (let r = rowStart + 1; r <= ROWS + 1; r++) {
    const ry = GAP + (r - 1) * (CELL_H + GAP) - GAP;
    const d = Math.abs(bottomPx - ry);
    if (d < bestDy) { bestDy = d; bestRowEnd = r; }
  }
  return {
    colEnd: Math.min(COLS + 1, Math.max(colStart + 1, bestColEnd)),
    rowEnd: Math.min(ROWS + 1, Math.max(rowStart + 1, bestRowEnd)),
  };
}

// ══════════════════════════════════════════
//  CANVAS SIZE & GRID BUILD
// ══════════════════════════════════════════
function computeCanvasSize() {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth - 48;
  const maxH = wrap.clientHeight - 60;

  // Target ~16:10 or fill width
  const targetW = Math.min(640, maxW);
  const targetH = Math.min(480, maxH);

  CELL_W = Math.floor((targetW - GAP * (COLS + 1)) / COLS);
  CELL_H = Math.floor((targetH - GAP * (ROWS + 1)) / ROWS);

  CANVAS_W = GAP * (COLS + 1) + CELL_W * COLS;
  CANVAS_H = GAP * (ROWS + 1) + CELL_H * ROWS;
}

function rebuildGrid() {
  COLS = Math.max(2, Math.min(16, parseInt(document.getElementById('cfg-cols').value) || 5));
  ROWS = Math.max(2, Math.min(16, parseInt(document.getElementById('cfg-rows').value) || 6));
  GAP  = Math.max(0, Math.min(32, parseInt(document.getElementById('cfg-gap').value) || 8));

  computeCanvasSize();

  const canvas = document.getElementById('canvas');
  canvas.style.width  = CANVAS_W + 'px';
  canvas.style.height = CANVAS_H + 'px';

  document.getElementById('cv-lbl').textContent =
    `${COLS} × ${ROWS} grid · ${GAP}px gap · ${CANVAS_W}×${CANVAS_H}px`;

  // Build cell background
  const bg = document.getElementById('grid-bg');
  bg.style.cssText = `
    display: grid;
    grid-template-columns: repeat(${COLS}, ${CELL_W}px);
    grid-template-rows: repeat(${ROWS}, ${CELL_H}px);
    gap: ${GAP}px;
    padding: ${GAP}px;
  `;
  bg.innerHTML = '';
  for (let r = 1; r <= ROWS; r++) {
    for (let c = 1; c <= COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.dataset.col = c;
      cell.dataset.row = r;
      bg.appendChild(cell);
    }
  }

  // Clamp existing elements
  elements.forEach(el => {
    el.colStart = Math.max(1, Math.min(COLS, el.colStart));
    el.colEnd   = Math.max(el.colStart + 1, Math.min(COLS + 1, el.colEnd));
    el.rowStart = Math.max(1, Math.min(ROWS, el.rowStart));
    el.rowEnd   = Math.max(el.rowStart + 1, Math.min(ROWS + 1, el.rowEnd));
  });

  renderElements();
  genCode();
}

// ══════════════════════════════════════════
//  RENDER ELEMENTS
// ══════════════════════════════════════════
function renderElements() {
  document.querySelectorAll('.design-el,.el-ghost').forEach(e => e.remove());
  const canvas = document.getElementById('canvas');

  elements.forEach(el => {
    const rect = elRect(el);
    const div = document.createElement('div');
    div.className = `design-el el-${el.type}${el.id === selId ? ' selected' : ''}`;
    div.dataset.id = el.id;
    div.style.left   = rect.x + 'px';
    div.style.top    = rect.y + 'px';
    div.style.width  = rect.w + 'px';
    div.style.height = rect.h + 'px';

    const tag  = document.createElement('div');
    tag.className = 'el-type-tag';
    tag.textContent = EL_DEF[el.type].lbl;
    tag.style.color = EL_DEF[el.type].color;

    const prev = document.createElement('div');
    prev.className = 'el-content-preview';
    prev.textContent = el.content;

    const cls = document.createElement('button');
    cls.className = 'el-close';
    cls.innerHTML = '✕';
    cls.addEventListener('pointerdown', e => e.stopPropagation());
    cls.addEventListener('click', e => { e.stopPropagation(); delEl(el.id); });

    const rh = document.createElement('div');
    rh.className = 'el-resize';
    rh.addEventListener('pointerdown', e => {
      e.stopPropagation(); e.preventDefault();
      selId = el.id; renderElements(); showProps(el);
      startResize(e, el);
    });

    div.appendChild(tag);
    div.appendChild(prev);
    div.appendChild(cls);
    div.appendChild(rh);

    div.addEventListener('pointerdown', e => {
      if (e.target === cls || e.target === rh) return;
      e.stopPropagation(); e.preventDefault();
      selId = el.id; renderElements(); showProps(el);
      startMove(e, el);
    });
    div.addEventListener('click', e => {
      e.stopPropagation();
      selId = el.id; renderElements(); showProps(el);
    });

    canvas.appendChild(div);
  });

  showProps(elements.find(e => e.id === selId) || null);
  genCode();
}

// ══════════════════════════════════════════
//  MOVE — free drag with guide overlay
// ══════════════════════════════════════════
function startMove(evt, el) {
  const canvas = document.getElementById('canvas');
  const div = canvas.querySelector(`.design-el[data-id="${el.id}"]`);
  const preview = document.getElementById('snap-preview');

  const cvRect = canvas.getBoundingClientRect();
  const origRect = elRect(el);
  const spanCols = el.colEnd - el.colStart;
  const spanRows = el.rowEnd - el.rowStart;

  // Create ghost at original position
  const ghost = document.createElement('div');
  ghost.className = 'el-ghost';
  ghost.style.left   = origRect.x + 'px';
  ghost.style.top    = origRect.y + 'px';
  ghost.style.width  = origRect.w + 'px';
  ghost.style.height = origRect.h + 'px';
  canvas.appendChild(ghost);

  // Mouse offset within element
  const offX = evt.clientX - cvRect.left - origRect.x;
  const offY = evt.clientY - cvRect.top  - origRect.y;

  let currentSnap = { colStart: el.colStart, colEnd: el.colEnd, rowStart: el.rowStart, rowEnd: el.rowEnd };
  let freePx = origRect.x, freePy = origRect.y;

  div.classList.add('dragging');
  div.setPointerCapture(evt.pointerId);

  function updateGuides(snap) {
    // Highlight guide cells
    document.querySelectorAll('.grid-cell').forEach(cell => {
      const c = +cell.dataset.col, r = +cell.dataset.row;
      cell.classList.remove('guide-col','guide-row','guide-target');
      // column band
      if (c >= snap.colStart && c < snap.colEnd) cell.classList.add('guide-col');
      // row band
      if (r >= snap.rowStart && r < snap.rowEnd) cell.classList.add('guide-row');
      // intersection target
      if (c >= snap.colStart && c < snap.colEnd && r >= snap.rowStart && r < snap.rowEnd)
        cell.classList.add('guide-target');
    });

    // Guide lines
    const ov = document.getElementById('guide-overlay');
    ov.innerHTML = '';
    const tl = cellToPixel(snap.colStart, snap.rowStart);
    const br = cellToPixel(snap.colEnd - 1, snap.rowEnd - 1);

    // horizontal lines at top & bottom
    [tl.y, br.y + CELL_H].forEach(yy => {
      const ln = document.createElement('div');
      ln.className = 'guide-line-h';
      ln.style.top = yy + 'px';
      ov.appendChild(ln);
    });
    // vertical lines at left & right
    [tl.x, br.x + CELL_W].forEach(xx => {
      const ln = document.createElement('div');
      ln.className = 'guide-line-v';
      ln.style.left = xx + 'px';
      ov.appendChild(ln);
    });

    // Snap preview
    const snapRect2 = elRect({ colStart: snap.colStart, colEnd: snap.colEnd, rowStart: snap.rowStart, rowEnd: snap.rowEnd });
    preview.style.left   = snapRect2.x + 'px';
    preview.style.top    = snapRect2.y + 'px';
    preview.style.width  = snapRect2.w + 'px';
    preview.style.height = snapRect2.h + 'px';
    preview.classList.add('active');
  }

  function clearGuides() {
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('guide-col','guide-row','guide-target'));
    document.getElementById('guide-overlay').innerHTML = '';
    preview.classList.remove('active');
  }

  function onMove(ev) {
    if (ev.pointerId !== evt.pointerId) return;

    // Free movement
    freePx = ev.clientX - cvRect.left - offX;
    freePy = ev.clientY - cvRect.top  - offY;

    // Clamp to canvas
    freePx = Math.max(0, Math.min(freePx, CANVAS_W - origRect.w));
    freePy = Math.max(0, Math.min(freePy, CANVAS_H - origRect.h));

    // Move div freely
    div.style.left = freePx + 'px';
    div.style.top  = freePy + 'px';

    // Compute snap target (don't apply yet)
    currentSnap = snapElToGrid(freePx, freePy, spanCols, spanRows);
    updateGuides(currentSnap);
  }

  function onUp(ev) {
    if (ev.pointerId !== evt.pointerId) return;
    div.removeEventListener('pointermove', onMove);
    div.removeEventListener('pointerup', onUp);
    div.classList.remove('dragging');
    ghost.remove();
    clearGuides();

    // STRICT SNAP on release — no partial positions
    el.colStart = currentSnap.colStart;
    el.colEnd   = currentSnap.colEnd;
    el.rowStart = currentSnap.rowStart;
    el.rowEnd   = currentSnap.rowEnd;

    renderElements();
    genCode();
  }

  div.addEventListener('pointermove', onMove, { passive: false });
  div.addEventListener('pointerup', onUp);
}

// ══════════════════════════════════════════
//  RESIZE — drag bottom-right, snap to cell edges
// ══════════════════════════════════════════
function startResize(evt, el) {
  const canvas = document.getElementById('canvas');
  const div = canvas.querySelector(`.design-el[data-id="${el.id}"]`);
  const rh = div.querySelector('.el-resize');
  const preview = document.getElementById('snap-preview');
  const origRect = elRect(el);

  let currentSnap = { colEnd: el.colEnd, rowEnd: el.rowEnd };

  rh.setPointerCapture(evt.pointerId);

  function updateResizeGuides(colEnd, rowEnd) {
    document.querySelectorAll('.grid-cell').forEach(cell => {
      const c = +cell.dataset.col, r = +cell.dataset.row;
      cell.classList.remove('guide-col','guide-row','guide-target');
      if (c >= el.colStart && c < colEnd) cell.classList.add('guide-col');
      if (r >= el.rowStart && r < rowEnd) cell.classList.add('guide-row');
      if (c >= el.colStart && c < colEnd && r >= el.rowStart && r < rowEnd)
        cell.classList.add('guide-target');
    });
    const ov = document.getElementById('guide-overlay');
    ov.innerHTML = '';
    const tl = cellToPixel(el.colStart, el.rowStart);
    const br = cellToPixel(colEnd - 1, rowEnd - 1);
    [tl.y, br.y + CELL_H].forEach(yy => {
      const ln = document.createElement('div'); ln.className = 'guide-line-h';
      ln.style.top = yy + 'px'; ov.appendChild(ln);
    });
    [tl.x, br.x + CELL_W].forEach(xx => {
      const ln = document.createElement('div'); ln.className = 'guide-line-v';
      ln.style.left = xx + 'px'; ov.appendChild(ln);
    });
    const snapR = elRect({ colStart: el.colStart, colEnd, rowStart: el.rowStart, rowEnd });
    preview.style.left   = snapR.x + 'px';
    preview.style.top    = snapR.y + 'px';
    preview.style.width  = snapR.w + 'px';
    preview.style.height = snapR.h + 'px';
    preview.classList.add('active');
  }

  function clearGuides() {
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('guide-col','guide-row','guide-target'));
    document.getElementById('guide-overlay').innerHTML = '';
    preview.classList.remove('active');
  }

  const cvRect = canvas.getBoundingClientRect();

  function onMove(ev) {
    if (ev.pointerId !== evt.pointerId) return;
    const rightPx  = ev.clientX - cvRect.left;
    const bottomPx = ev.clientY - cvRect.top;
    const snapped = snapResizeTo(el.colStart, el.rowStart, rightPx, bottomPx);
    currentSnap = snapped;

    // Live preview size
    const snapR = elRect({ colStart: el.colStart, colEnd: snapped.colEnd, rowStart: el.rowStart, rowEnd: snapped.rowEnd });
    div.style.width  = snapR.w + 'px';
    div.style.height = snapR.h + 'px';
    updateResizeGuides(snapped.colEnd, snapped.rowEnd);
  }

  function onUp(ev) {
    if (ev.pointerId !== evt.pointerId) return;
    rh.removeEventListener('pointermove', onMove);
    rh.removeEventListener('pointerup', onUp);
    clearGuides();

    // STRICT SNAP — commit
    el.colEnd = currentSnap.colEnd;
    el.rowEnd = currentSnap.rowEnd;

    renderElements();
    genCode();
  }

  rh.addEventListener('pointermove', onMove, { passive: false });
  rh.addEventListener('pointerup', onUp);
}

// ══════════════════════════════════════════
//  PLACE ELEMENT (from drop or picker)
// ══════════════════════════════════════════
function placeEl(type, dropPx, dropPy) {
  const def = EL_DEF[type];
  const spanCols = Math.min(def.defCols, COLS);
  const spanRows = Math.min(def.defRows, ROWS);
  const snap = snapElToGrid(dropPx, dropPy, spanCols, spanRows);
  const el = {
    id: ++eid,
    type,
    content: def.content,
    colStart: snap.colStart,
    colEnd:   snap.colEnd,
    rowStart: snap.rowStart,
    rowEnd:   snap.rowEnd,
  };
  elements.push(el);
  selId = el.id;
  renderElements();
  showToast(def.lbl + ' placed ✓');
}

// ══════════════════════════════════════════
//  PALETTE DRAG
// ══════════════════════════════════════════
function palDrag(type, e) {
  palType = type;
  e.dataTransfer.setData('text/plain', type);
  e.dataTransfer.effectAllowed = 'copy';
}

document.getElementById('canvas-wrap').addEventListener('dragover', e => e.preventDefault());
document.getElementById('canvas-wrap').addEventListener('drop', e => {
  if (!palType) return;
  e.preventDefault();
  const cvRect = document.getElementById('canvas').getBoundingClientRect();
  const px = e.clientX - cvRect.left;
  const py = e.clientY - cvRect.top;
  placeEl(palType, px, py);
  palType = null;
});

// ══════════════════════════════════════════
//  AUTO LAYOUT
// ══════════════════════════════════════════
function autoLayout() {
  elements = [];
  selId = null;
  eid = 0;

  // Ensure at least 5 cols, 6 rows for auto layout
  if (COLS < 5) { COLS = 5; document.getElementById('cfg-cols').value = 5; }
  if (ROWS < 6) { ROWS = 6; document.getElementById('cfg-rows').value = 6; }

  computeCanvasSize();

  const midCol = Math.floor(COLS * 0.6) + 1; // visual takes 60% cols
  const headlineRows = 1;
  const footerRow = ROWS;
  const contentStart = 2;
  const contentEnd = ROWS; // row before footer

  const layout = [
    // Headline: full width, top row
    { type:'headline',    colStart:1,       colEnd:COLS+1,    rowStart:1,           rowEnd:2 },
    // Visual: dominant left block
    { type:'visual',      colStart:1,       colEnd:midCol,    rowStart:contentStart, rowEnd:contentEnd },
    // Description: right side
    { type:'description', colStart:midCol,  colEnd:COLS+1,    rowStart:contentStart, rowEnd:contentEnd },
    // Footer: full width bottom
    { type:'footer',      colStart:1,       colEnd:COLS+1,    rowStart:footerRow,   rowEnd:ROWS+1 },
  ];

  layout.forEach(l => {
    elements.push({ id:++eid, type:l.type, content:EL_DEF[l.type].content, ...l });
  });

  rebuildGrid();
  showToast('Auto Layout applied ✓');
}

// ══════════════════════════════════════════
//  PROPS PANEL
// ══════════════════════════════════════════
function showProps(el) {
  const form = document.getElementById('props-form');
  const nosel = document.getElementById('no-sel');
  if (!el) {
    form.style.display = 'none';
    nosel.style.display = 'flex';
    return;
  }
  form.style.display = 'block';
  nosel.style.display = 'none';
  document.getElementById('pr-grid-span').textContent =
    `col ${el.colStart}→${el.colEnd} · row ${el.rowStart}→${el.rowEnd}`;
  document.getElementById('pr-content').value = el.content;
  document.getElementById('pr-cs').value = el.colStart;
  document.getElementById('pr-ce').value = el.colEnd;
  document.getElementById('pr-rs').value = el.rowStart;
  document.getElementById('pr-re').value = el.rowEnd;
}

function updContent() {
  const el = elements.find(e => e.id === selId); if (!el) return;
  el.content = document.getElementById('pr-content').value;
  renderElements();
}
function updGridInp() {
  const el = elements.find(e => e.id === selId); if (!el) return;
  el.colStart = Math.max(1, Math.min(COLS, parseInt(document.getElementById('pr-cs').value) || 1));
  el.colEnd   = Math.max(el.colStart + 1, Math.min(COLS + 1, parseInt(document.getElementById('pr-ce').value) || 2));
  el.rowStart = Math.max(1, Math.min(ROWS, parseInt(document.getElementById('pr-rs').value) || 1));
  el.rowEnd   = Math.max(el.rowStart + 1, Math.min(ROWS + 1, parseInt(document.getElementById('pr-re').value) || 2));
  renderElements(); showProps(el);
}

// ══════════════════════════════════════════
//  DELETE
// ══════════════════════════════════════════
function delEl(id) {
  elements = elements.filter(e => e.id !== id);
  if (selId === id) { selId = null; }
  renderElements();
}
function deleteSel() { if (selId) delEl(selId); }

// ══════════════════════════════════════════
//  CODE GENERATION — pure CSS Grid output
// ══════════════════════════════════════════
function genCode() {
  // HTML
  let html = `<div class="layout">\n`;
  elements.forEach(el => {
    html += `  <div class="${el.type}">${el.content}</div>\n`;
  });
  html += `</div>`;

  // CSS
  let css = `.layout {\n`;
  css += `  display: grid;\n`;
  css += `  grid-template-columns: repeat(${COLS}, 1fr);\n`;
  css += `  grid-template-rows: repeat(${ROWS}, 1fr);\n`;
  css += `  gap: ${GAP}px;\n`;
  css += `  width: ${CANVAS_W}px;\n`;
  css += `  height: ${CANVAS_H}px;\n`;
  css += `}\n`;

  elements.forEach(el => {
    css += `\n.${el.type} {\n`;
    css += `  grid-column: ${el.colStart} / ${el.colEnd};\n`;
    css += `  grid-row: ${el.rowStart} / ${el.rowEnd};\n`;
    css += `}\n`;
  });

  document.getElementById('code-html').textContent = html;
  document.getElementById('code-css').textContent  = css;
}

// ══════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.r-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tp').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tp-' + name).classList.add('active');
}

// ══════════════════════════════════════════
//  COPY
// ══════════════════════════════════════════
function copyCode(which) {
  const txt = document.getElementById('code-' + which).textContent;
  navigator.clipboard.writeText(txt);
  showToast((which === 'css' ? 'CSS' : 'HTML') + ' copied!');
}
function copyCSS() {
  genCode();
  copyCode('css');
}

// ══════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════
function resetAll() {
  elements = []; selId = null; eid = 0;
  renderElements();
  showToast('Canvas reset');
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ══════════════════════════════════════════
//  GLOBAL CLICK — deselect
// ══════════════════════════════════════════
document.addEventListener('click', e => {
  if (!e.target.closest('.design-el') && !e.target.closest('.sidebar')) {
    selId = null;
    document.querySelectorAll('.design-el').forEach(d => d.classList.remove('selected'));
    showProps(null);
  }
});

// ══════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.key === 'Delete' || e.key === 'Backspace') && document.activeElement.tagName !== 'INPUT') {
    deleteSel();
  }
  if (e.key === 'Escape') {
    selId = null;
    document.querySelectorAll('.design-el').forEach(d => d.classList.remove('selected'));
    showProps(null);
  }
  if (selId && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    const el = elements.find(e2 => e2.id === selId); if (!el) return;
    const span_c = el.colEnd - el.colStart;
    const span_r = el.rowEnd - el.rowStart;
    if (e.key === 'ArrowLeft'  && el.colStart > 1) { el.colStart--; el.colEnd = el.colStart + span_c; }
    if (e.key === 'ArrowRight' && el.colEnd <= COLS) { el.colStart++; el.colEnd = el.colStart + span_c; }
    if (e.key === 'ArrowUp'    && el.rowStart > 1) { el.rowStart--; el.rowEnd = el.rowStart + span_r; }
    if (e.key === 'ArrowDown'  && el.rowEnd <= ROWS) { el.rowStart++; el.rowEnd = el.rowStart + span_r; }
    el.colStart = Math.max(1, Math.min(COLS, el.colStart));
    el.colEnd   = Math.max(el.colStart + 1, Math.min(COLS + 1, el.colEnd));
    el.rowStart = Math.max(1, Math.min(ROWS, el.rowStart));
    el.rowEnd   = Math.max(el.rowStart + 1, Math.min(ROWS + 1, el.rowEnd));
    renderElements(); showProps(el);
  }
});

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
window.addEventListener('load', () => {
  rebuildGrid();
  autoLayout();
});
window.addEventListener('resize', () => {
  rebuildGrid();
});
