<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grid Design Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ONLY MODIFIED PARTS */

:root{
  --grid-line:red;
  --grid-line-strong:red;
}

/* REMOVE TOAST UI */
.toast{display:none!important}

/* ADD TYPOGRAPHY CONTROL STYLE */
.typo-row{display:flex;gap:6px;margin-top:6px}
.typo-row select,.typo-row input{
  flex:1;
  padding:6px;
  font-size:11px;
  border:1px solid var(--border);
  border-radius:6px;
}

/* AUTO LAYOUT BUTTON */
.btn-auto{
  background:#111;color:#fff;
  border:none;border-radius:8px;
  padding:8px 10px;
  font-size:12px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- ADD AUTO LAYOUT BUTTON -->
<header>
  <div class="logo">
    <div class="logo-box"><span></span><span></span><span></span><span></span></div>
    Grid Design
  </div>
  <div class="header-div"></div>
  <div class="header-right">
    <button class="btn-auto" onclick="autoWrap()">⚡</button>
    <button class="btn-icon danger" onclick="resetCanvas()">↺</button>
    <button class="btn-icon" id="btn-preview" onclick="togglePreview()">◉</button>
    <button class="btn-primary green" onclick="exportPDF()">⬇ Export PDF</button>
  </div>
</header>

<script>
/* ========= MODIFICATIONS ONLY ========= */

/* 1. GRID RED + ALWAYS VISIBLE */
function drawGridLines(){
  const cvs=document.getElementById('grid-lines-canvas');
  if(!cvs) return;
  cvs.width=canvasW; cvs.height=canvasH;
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,canvasW,canvasH);

  const cells=computeCells();

  ctx.lineWidth=1;
  ctx.strokeStyle='red';
  ctx.setLineDash([3,3]);

  cells.forEach(c=>{
    ctx.strokeRect(c.x,c.y,c.w,c.h);
  });

  ctx.setLineDash([]);
}

/* 2. PREVENT ELEMENT SHIFT */
function placeEl(type,x,y){
  const def=EL_DEF[type];
  const ew=Math.round(canvasW*def.fw);
  const eh=Math.round(canvasH*def.fh);

  let s=strictSnap(x,y,ew,eh);

  // SMART PLACEMENT
  const cells=computeCells();
  for(let c of cells){
    const occupied=elements.some(e=>
      c.x<e.x+e.w && c.x+c.w>e.x &&
      c.y<e.y+e.h && c.y+c.h>e.y
    );
    if(!occupied){
      s={x:c.x,y:c.y,w:c.w,h:c.h};
      break;
    }
  }

  const el={
    id:++eid,type,content:def.content,
    x:s.x,y:s.y,w:s.w,h:s.h,
    fontSize:14,
    align:'center'
  };

  elements.push(el);
  selId=el.id;

  renderEls();
  showProps(el);
  genCode();
}

/* 3. TYPOGRAPHY CONTROL */
function showProps(el){
  const form=document.getElementById('props-form');
  if(!el){form.style.display='none';return;}

  form.style.display='block';

  let html=`
    <div class="pr">
      <div class="pr-label">Content</div>
      <input class="pr-inp" id="pr-content" value="${el.content}" oninput="updContent()">
    </div>

    <div class="typo-row">
      <input type="number" value="${el.fontSize||14}" onchange="updFont(this.value)">
      <select onchange="updAlign(this.value)">
        <option ${el.align==='left'?'selected':''}>left</option>
        <option ${el.align==='center'?'selected':''}>center</option>
        <option ${el.align==='right'?'selected':''}>right</option>
      </select>
    </div>
  `;

  form.innerHTML=html;
}

function updFont(v){
  const el=elements.find(e=>e.id===selId);
  el.fontSize=parseInt(v)||14;
  renderEls();
}

function updAlign(v){
  const el=elements.find(e=>e.id===selId);
  el.align=v;
  renderEls();
}

/* APPLY TYPO STYLE */
function renderEls(){
  document.querySelectorAll('#canvas > .design-el').forEach(e=>e.remove());
  const canvas=document.getElementById('canvas');

  elements.forEach(el=>{
    const div=document.createElement('div');
    div.className='design-el';
    div.style.left=el.x+'px';
    div.style.top=el.y+'px';
    div.style.width=el.w+'px';
    div.style.height=el.h+'px';

    const txt=document.createElement('div');
    txt.className='el-prev';
    txt.textContent=el.content;
    txt.style.fontSize=(el.fontSize||14)+'px';
    txt.style.textAlign=el.align||'center';

    div.appendChild(txt);
    canvas.appendChild(div);
  });
}

/* 4. REMOVE TOAST LOGIC */
function showToast(){}

/* 5. FIX DOUBLE TAP */
let lastTap=0;
document.addEventListener('pointerdown',e=>{
  const now=Date.now();
  if(now-lastTap<300){
    const el=e.target.closest('.design-el');
    if(el){
      selId=parseInt(el.dataset.id);
      showProps(elements.find(x=>x.id===selId));
    }
  }
  lastTap=now;
});

/* 6. COLUMN GRID SUPPORT ROWS */
function computeCells(){
  const cells=[];
  const effCols=Math.max(cols,1);
  const effRows=Math.max(rows,1);

  const cellW=(canvasW-gap*(effCols+1))/effCols;
  const cellH=(canvasH-gap*(effRows+1))/effRows;

  for(let r=0;r<effRows;r++){
    for(let c=0;c<effCols;c++){
      cells.push({
        x:gap+c*(cellW+gap),
        y:gap+r*(cellH+gap),
        w:cellW,
        h:cellH
      });
    }
  }
  return cells;
}

</script>
</body>
</html>
